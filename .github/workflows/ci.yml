name: .NET CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore DumbApplication/DumbApplication.sln

    - name: Build
      run: dotnet build DumbApplication/DumbApplication.sln --no-restore

    - name: Test
      run: dotnet test DumbApplication/DumbApplication.sln --no-build --verbosity normal
